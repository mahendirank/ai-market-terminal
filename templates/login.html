<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Market Terminal — Login</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #030912;
    color: #e8eaf0;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,60,120,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,120,80,0.08) 0%, transparent 50%);
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  /* Logo / header */
  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 12px rgba(0,192,135,0.5));
  }
  .logo-title {
    font-size: 16px;
    font-weight: 700;
    color: #e8eaf0;
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 10px;
    color: #4b6a8a;
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* Card */
  .card {
    background: #0a1520;
    border: 1px solid #1a2e45;
    border-radius: 12px;
    padding: 32px 28px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
  }

  .card-title {
    font-size: 11px;
    color: #4b6a8a;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-align: center;
  }

  /* Form */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 9px;
    color: #4b6a8a;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: #060d14;
    border: 1px solid #1a2e45;
    border-radius: 6px;
    color: #e8eaf0;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: #00c087;
    box-shadow: 0 0 0 2px rgba(0,192,135,0.1);
  }
  .field input::placeholder { color: #2a3a4a; }

  /* Login button */
  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, #00914f, #007a42);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.15s;
  }
  .btn-login:hover { background: linear-gradient(135deg, #00c087, #009a6e); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Error */
  .error-box {
    background: #1a0008;
    border: 1px solid #7f1d1d;
    border-radius: 6px;
    color: #fca5a5;
    font-size: 11px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: none;
  }
  .error-box.show { display: block; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 9px;
    color: #1e3a5f;
    letter-spacing: 1px;
  }

  /* Ticker strip at bottom */
  .ticker {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #05090e;
    border-top: 1px solid #0d1f2e;
    padding: 6px 16px;
    font-size: 9px;
    color: #2a4a6a;
    letter-spacing: 0.5px;
    display: flex;
    gap: 20px;
    overflow: hidden;
  }
  .ticker span { white-space: nowrap; }
  .t-up { color: #00c087; }
  .t-dn { color: #f43f5e; }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }

  /* Pulse on logo */
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(0,192,135,0.4)); }
    50% { filter: drop-shadow(0 0 20px rgba(0,192,135,0.8)); }
  }
  .logo-icon { animation: pulse 3s ease-in-out infinite; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <span class="logo-icon">◈</span>
    <div class="logo-title">AI MARKET TERMINAL</div>
    <div class="logo-sub">INSTITUTIONAL INTELLIGENCE · LIVE</div>
  </div>

  <div class="card">
    <div class="card-title">SUBSCRIBER LOGIN</div>

    <div class="error-box" id="error-box">
      ⚠ Invalid username or password. Please try again.
    </div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="field">
        <label>USERNAME</label>
        <input type="text" id="username" name="username"
               placeholder="Enter username" autocomplete="username"
               autofocus required>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="password" name="password"
               placeholder="Enter password" autocomplete="current-password"
               required>
      </div>
      <button class="btn-login" type="submit" id="login-btn">
        ENTER TERMINAL
      </button>
    </form>
  </div>

  <div class="footer">
    AI MARKET TERMINAL · PRIVATE ACCESS ONLY<br>
    Contact admin to get access
  </div>
</div>

<div class="ticker" id="ticker">
  <span>◌ Loading live data...</span>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  var btn  = document.getElementById('login-btn');
  var errEl= document.getElementById('error-box');
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner">◌</span> VERIFYING...';

  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;

  try {
    var resp = await fetch('/login', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({username, password}),
    });
    var data = await resp.json();

    if (data.ok) {
      btn.innerHTML = '✓ ACCESS GRANTED';
      btn.style.background = 'linear-gradient(135deg, #00c087, #009a6e)';
      setTimeout(function() {
        window.location.href = data.redirect || '/';
      }, 400);
    } else {
      errEl.textContent = '⚠ ' + (data.message || 'Invalid username or password.');
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'ENTER TERMINAL';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (err) {
    errEl.textContent = '⚠ Connection error. Please try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'ENTER TERMINAL';
  }
}

// Live ticker (public, no auth needed)
async function loadTicker() {
  try {
    var d = await fetch('/api/live-ticker').then(r => r.json());
    var items = Object.entries(d).slice(0, 8).map(function([k, v]) {
      var chg = v.change_pct || 0;
      var cls = chg >= 0 ? 't-up' : 't-dn';
      var arr = chg >= 0 ? '▲' : '▼';
      return '<span><b style="color:#4b6a8a;">' + k + '</b> <span class="' + cls + '">' +
             (v.price || '—') + ' ' + arr + ' ' + Math.abs(chg).toFixed(2) + '%</span></span>';
    }).join('');
    if (items) document.getElementById('ticker').innerHTML = items;
  } catch(e) {}
}
loadTicker();
setInterval(loadTicker, 30000);
</script>
</body>
</html>
