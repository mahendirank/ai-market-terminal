# Production compose for Hostinger VPS / any Linux host.
# - market-terminal: FastAPI app (pulled from GHCR, NOT built on the VPS)
# - redis: cache + cooldowns + chat memory
# - caddy: reverse proxy with auto-HTTPS (Let's Encrypt) for zyvoratech.co
#
# CI publishes the image to ghcr.io/mahendirank/ai-market-terminal:latest
# on every push to main (.github/workflows/deploy.yml). The VPS just pulls:
#
#   ./deploy.sh                                  # current main
#   ./deploy.sh sha-718bd77                      # rollback to a specific build
#
# First-time install on a fresh VPS: see bootstrap.sh and VPS_DEPLOYMENT.md.

services:
  market-terminal:
    image: ghcr.io/mahendirank/ai-market-terminal:${IMAGE_TAG:-latest}
    container_name: market-terminal
    restart: unless-stopped
    expose: ["8001"]
    volumes:
      - terminal_db:/app/db
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s     # image pull means no build wait — 90s covers cache warm-up only
    networks: [terminal]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: terminal-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [terminal]
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [market-terminal]
    networks: [terminal]
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  terminal_db:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  terminal:
    driver: bridge
