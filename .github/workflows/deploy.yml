name: Build & publish to GHCR

# Builds the production market-terminal image and pushes it to GitHub
# Container Registry on every push to main. The VPS then pulls the image
# (no build on the VPS), which fixes the class of failures we hit when
# rebuilding on a memory-constrained host with intermittent github.com
# access (tvdatafeed git+https install dying mid-build, etc.).
#
# Required permissions: this workflow uses the auto-provided GITHUB_TOKEN
# to push to ghcr.io. The repo's Package settings must allow Actions to
# publish — true by default for new repos, but worth confirming under
# Settings → Actions → General → Workflow permissions ("Read and write").

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from the Actions UI for re-publishes

# Multiple pushes in quick succession → cancel the older one so we don't
# race to publish stale-then-fresh latest tags.
concurrency:
  group: ghcr-publish-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # ghcr image namespace MUST be the GitHub owner login, lowercased.
  IMAGE_NAME: mahendirank/ai-market-terminal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags published:
          #   latest      — always points to current main HEAD
          #   sha-<7char> — immutable, used for rollback
          #   YYYYMMDD    — daily build snapshot
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache for the layer cache — keeps repeat builds
          # short (~2 min instead of 8) while still rebuilding the pip
          # layer when requirements.txt changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Multi-arch: amd64 for x86 hosts + arm64 for Oracle Cloud Always Free
          # (ARM Ampere) — the free-forever target host is aarch64.
          platforms: linux/amd64,linux/arm64

      - name: Publish summary
        run: |
          echo "## Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy on VPS:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "ssh root@72.61.173.89" >> $GITHUB_STEP_SUMMARY
          echo "cd /opt/zyvora && ./deploy.sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
