name: CI

# Advisory CI — runs on every push and PR. NOT marked as a required status check
# so a failure here cannot block an emergency `git push` to main.
# Per Sprint 1: prod doubles as staging. CI is informational until staging exists.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # matches Dockerfile
          cache: pip
      - run: pip install ruff
      - run: ruff check . --output-format=github
        continue-on-error: true  # advisory in Sprint 1
      - run: ruff format --check .
        continue-on-error: true

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "::warning::requirements.txt install had warnings"
          pip install pytest pytest-asyncio httpx
      - name: Run pytest
        run: pytest -v --tb=short
        continue-on-error: true  # advisory in Sprint 1 — coverage is being built up

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: market-terminal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
