# Pre-commit hooks for Zyvora Terminal.
# Install with: pip install pre-commit && pre-commit install
# Run all hooks once: pre-commit run --all-files
#
# Sprint 1: minimal, advisory. No --fix that could change live code.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key  # block accidentally-committed SSH keys

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--exit-zero]  # advisory: never block a commit in Sprint 1
      - id: ruff-format
        args: [--check]      # warn, don't auto-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "(reviews/|requirements\\.baseline\\.txt|\\.env\\.production\\.example)"
